set -g default-terminal "tmux-256color"
set -as terminal-features ",xterm-256color:RGB"

set -g mouse on
set -g history-limit 50000
set -g renumber-windows on
set -g status-interval 5
set -s set-clipboard on
setw -g mode-keys vi
setw -g automatic-rename on
setw -g allow-rename on

unbind '"'
unbind %
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"
bind r source-file ~/.tmux.conf \; display-message "tmux config reloaded"
bind k clear-history \; display-message "scrollback cleared"

set -g status-style "bg=#0f172a,fg=#cbd5e1"
set -g message-style "bg=#082f49,fg=#e0f2fe"
set -g message-command-style "bg=#082f49,fg=#e0f2fe"
set -g pane-border-style "fg=#334155"
set -g pane-active-border-style "fg=#38bdf8"

set -g status-left-length 40
set -g status-left "#[fg=#0f172a,bg=#38bdf8,bold] #S #[fg=#38bdf8,bg=#0f172a,nobold]"
set -g status-right "#[fg=#94a3b8] %a %b %d #[fg=#38bdf8]| #[fg=#e2e8f0]%H:%M "

setw -g window-status-format "#[fg=#94a3b8] #I #W "
setw -g window-status-current-format "#[fg=#0f172a,bg=#f59e0b,bold] #I #W "
